services:
  postgres:
    image: postgres:15
    container_name: tickle-db
    environment:
      POSTGRES_DB: tickle
      POSTGRES_USER: tickle
      POSTGRES_PASSWORD: tickle1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres-data: